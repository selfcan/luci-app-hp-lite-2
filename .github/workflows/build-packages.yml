name: Build hp-lite Packages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: openwrt-24.10.7-x86-64-ipk
            sdk_base_url: https://downloads.openwrt.org/releases/24.10.7/targets/x86/64
            package_ext: ipk

          - name: openwrt-25.12.4-x86-64-apk
            sdk_base_url: https://downloads.openwrt.org/releases/25.12.4/targets/x86/64
            package_ext: apk

    steps:
      - name: Checkout package source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev file wget curl xz-utils zstd

      - name: Download OpenWrt SDK
        env:
          SDK_BASE_URL: ${{ matrix.sdk_base_url }}
        run: |
          SDK_FILE="$(curl -fsSL "${SDK_BASE_URL}/" | grep -oE 'openwrt-sdk-[^"]+Linux-x86_64\.tar\.(xz|zst)' | head -n 1)"

          if [ -z "${SDK_FILE}" ]; then
            exit 1
          fi

          curl -fL "${SDK_BASE_URL}/${SDK_FILE}" -o "${SDK_FILE}"

          case "${SDK_FILE}" in
            *.tar.zst)
              tar --use-compress-program=unzstd -xf "${SDK_FILE}"
              ;;
            *.tar.xz)
              tar -xJf "${SDK_FILE}"
              ;;
            *)
              exit 1
              ;;
          esac

          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n 1)"

          if [ -z "${SDK_DIR}" ]; then
            exit 1
          fi

          echo "SDK_DIR=${SDK_DIR}" >> "$GITHUB_ENV"

      - name: Copy package into SDK
        run: |
          mkdir -p "${SDK_DIR}/package/luci-app-hp-lite"

          rsync -a ./ "${SDK_DIR}/package/luci-app-hp-lite/" --exclude='.git' --exclude='.github' --exclude='openwrt-sdk-*' --exclude='*.tar.xz' --exclude='*.tar.zst' --exclude='release' --exclude='artifacts'

      - name: Update feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build luci-app-hp-lite
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make defconfig
          make package/luci-app-hp-lite/clean V=s || true
          make package/luci-app-hp-lite/compile V=s -j"$(nproc)" || make package/luci-app-hp-lite/compile V=s -j1

      - name: Collect packages
        run: |
          mkdir -p "release/${{ matrix.name }}"

          PKG_VERSION="$(grep -oE 'PKG_VERSION:=[^[:space:]]+' Makefile | head -n 1 | cut -d '=' -f 2)"
          PKG_RELEASE="$(grep -oE 'PKG_RELEASE:=[^[:space:]]+' Makefile | head -n 1 | cut -d '=' -f 2)"

          if [ -z "${PKG_VERSION}" ]; then
            exit 1
          fi

          if [ -z "${PKG_RELEASE}" ]; then
            PKG_RELEASE="1"
          fi

          PKG_SUFFIX="${PKG_VERSION}-r${PKG_RELEASE}"

          find "${SDK_DIR}/bin/packages" -type f -name '*hp-lite*.${{ matrix.package_ext }}' | while read -r FILE; do
            BASENAME="$(basename "${FILE}")"

            # apk 默认文件名类似：luci-app-hp-lite-1.0-r2.apk
            # ipk 默认文件名类似：luci-app-hp-lite_1.0-r2_all.ipk
            # 这里把 apk 改成与 ipk 完全同名，只保留后缀不同。
            if [ "${{ matrix.package_ext }}" = "apk" ]; then
              case "${BASENAME}" in
                *-"${PKG_SUFFIX}".apk)
                  BASENAME="${BASENAME%-${PKG_SUFFIX}.apk}_${PKG_SUFFIX}_all.apk"
                  ;;
              esac
            fi

            cp -v "${FILE}" "release/${{ matrix.name }}/${BASENAME}"
          done

          if [ -z "$(find "release/${{ matrix.name }}" -type f)" ]; then
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hp-lite-${{ matrix.name }}
          path: release/${{ matrix.name }}/*

  release:
    name: Create or update Release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Checkout package source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Detect package version
        id: version
        run: |
          PKG_VERSION="$(grep -oE 'PKG_VERSION:=[^[:space:]]+' Makefile | head -n 1 | cut -d '=' -f 2)"
          PKG_RELEASE="$(grep -oE 'PKG_RELEASE:=[^[:space:]]+' Makefile | head -n 1 | cut -d '=' -f 2)"

          if [ -z "${PKG_VERSION}" ]; then
            exit 1
          fi

          if [ -z "${PKG_RELEASE}" ]; then
            PKG_RELEASE="1"
          fi

          TAG="v${PKG_VERSION}-r${PKG_RELEASE}"
          TITLE="luci-app-hp-lite ${TAG}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        run: |
          mkdir -p release

          find artifacts -type f \( -name '*.ipk' -o -name '*.apk' \) -exec cp -v {} release/ \;

          if [ -z "$(find release -type f)" ]; then
            exit 1
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          TITLE: ${{ steps.version.outputs.title }}
        run: |
          DISPLAY_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          NOTES=$(cat <<EOF
          自动编译 luci-app-hp-lite 软件包

          软件包版本：${TAG}
          编译时间：${DISPLAY_TIME}
          分支：${GITHUB_REF_NAME}
          Commit：${GITHUB_SHA}
          Workflow Run：${GITHUB_RUN_NUMBER}

          文件说明：
          - .ipk：OpenWrt 24.10.7 稳定版 opkg 系统
          - .apk：OpenWrt 25.12.4 稳定版 apk 系统
          EOF
          )

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -fa "${TAG}" "${GITHUB_SHA}" -m "Build ${TAG}"
          git push origin "refs/tags/${TAG}" --force

          if gh release view "${TAG}" >/dev/null 2>&1; then
            OLD_ASSETS="$(gh release view "${TAG}" --json assets -q '.assets[].name')"

            if [ -n "${OLD_ASSETS}" ]; then
              while IFS= read -r ASSET_NAME; do
                if [ -n "${ASSET_NAME}" ]; then
                  gh release delete-asset "${TAG}" "${ASSET_NAME}" -y || true
                fi
              done <<< "${OLD_ASSETS}"
            fi

            gh release edit "${TAG}" --title "${TITLE}" --notes "${NOTES}" --latest
            gh release upload "${TAG}" release/*.ipk release/*.apk --clobber
          else
            gh release create "${TAG}" release/*.ipk release/*.apk --title "${TITLE}" --notes "${NOTES}" --latest --target "${GITHUB_SHA}"
          fi

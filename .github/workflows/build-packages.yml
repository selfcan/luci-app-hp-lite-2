name: Build OpenWrt Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.format }} on OpenWrt ${{ matrix.openwrt }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - format: ipk
            openwrt: 24.10.7
            target: x86/64
          - format: apk
            openwrt: 25.12.4
            target: x86/64

    steps:
      - name: Checkout package source
        uses: actions/checkout@v4
        with:
          path: package-src

      - name: Show runner resources
        run: |
          echo "CPU cores:"
          nproc
          echo
          echo "Memory:"
          free -h
          echo
          echo "Disk:"
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            python3-setuptools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            xz-utils \
            zstd \
            time

      - name: Download OpenWrt SDK
        shell: bash
        run: |
          set -euxo pipefail

          cd "$RUNNER_TEMP"

          BASE_URL="https://downloads.openwrt.org/releases/${{ matrix.openwrt }}/targets/${{ matrix.target }}/"

          echo "OpenWrt SDK page:"
          echo "$BASE_URL"

          SDK_FILE="$(
            curl -fsSL "$BASE_URL" \
              | grep -oE 'openwrt-sdk-[^"]+Linux-x86_64\.tar\.(xz|zst)' \
              | head -n 1
          )"

          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: Cannot find OpenWrt SDK from $BASE_URL"
            exit 1
          fi

          echo "SDK_FILE=$SDK_FILE"

          curl -fL "${BASE_URL}${SDK_FILE}" -o "$SDK_FILE"

          tar -xf "$SDK_FILE"

          SDK_DIR="$(
            find "$RUNNER_TEMP" \
              -maxdepth 1 \
              -type d \
              -name 'openwrt-sdk-*' \
              | head -n 1
          )"

          if [ -z "$SDK_DIR" ]; then
            echo "ERROR: SDK directory not found"
            exit 1
          fi

          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

          echo "Extracted SDK:"
          echo "$SDK_DIR"

      - name: Copy package source into SDK
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$SDK_DIR/package/luci-app-hp-lite"

          rsync -a --delete \
            "$GITHUB_WORKSPACE/package-src/" \
            "$SDK_DIR/package/luci-app-hp-lite/" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='openwrt-sdk*' \
            --exclude='bin' \
            --exclude='build_dir' \
            --exclude='staging_dir' \
            --exclude='tmp' \
            --exclude='dl'

          echo "Package source copied to:"
          echo "$SDK_DIR/package/luci-app-hp-lite"

          echo "Package source files:"
          find "$SDK_DIR/package/luci-app-hp-lite" -maxdepth 2 -type f | sort

      - name: Update and install feeds
        shell: bash
        run: |
          set -euxo pipefail

          cd "$SDK_DIR"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure package
        shell: bash
        run: |
          set -euxo pipefail

          cd "$SDK_DIR"

          echo "CONFIG_PACKAGE_luci-app-hp-lite=m" > .config
          make defconfig

          grep -E 'CONFIG_PACKAGE_luci-app-hp-lite|CONFIG_PACKAGE_luci-i18n-hp-lite' .config || true

      - name: Build package
        shell: bash
        run: |
          set -euxo pipefail

          cd "$SDK_DIR"

          make package/luci-app-hp-lite/clean V=s || true
          make package/luci-app-hp-lite/compile V=s -j"$(nproc)"

      - name: Collect packages
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$GITHUB_WORKSPACE/dist/${{ matrix.format }}"

          find "$SDK_DIR/bin/packages" \
            \( -name '*hp-lite*.ipk' -o -name '*hp-lite*.apk' \) \
            -type f \
            -print \
            -exec cp -v {} "$GITHUB_WORKSPACE/dist/${{ matrix.format }}/" \;

          echo "Collected packages:"
          find "$GITHUB_WORKSPACE/dist" -type f | sort

      - name: Upload ${{ matrix.format }} packages
        uses: actions/upload-artifact@v4
        with:
          name: hp-lite-${{ matrix.format }}-openwrt-${{ matrix.openwrt }}
          path: dist/${{ matrix.format }}/*
          if-no-files-found: error

      - name: Show disk after build
        if: always()
        run: |
          df -h

  release:
    name: Upload packages to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show release files
        run: |
          find dist -type f | sort

      - name: Upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.ipk
            dist/**/*.apk
          fail_on_unmatched_files: true
